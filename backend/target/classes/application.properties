# Server Configuration
server.port=8080

# ==============================================================
# Database Configuration: H2 In-Memory (Mock/Dev Mode)
# ==============================================================
# Menggunakan mode PostgreSQL agar kompatibel dengan schema yang ada
spring.datasource.url=jdbc:h2:mem:geoevent_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Bisa diakses di browser: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA & Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
