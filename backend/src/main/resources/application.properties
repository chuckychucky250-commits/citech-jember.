# Server Configuration
server.port=8080

# ==============================================================
# Database Configuration: PostgreSQL (Recommended for Spatial/JTS)
# ==============================================================
# Pastikan Anda sudah membuat database bernama 'geoevent_db' di pgAdmin/PostgreSQL lokal
spring.datasource.url=jdbc:postgresql://localhost:5432/geoevent_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Properties
# Menggunakan PostgisDialect karena model Anda (CommunityEvidence, dll) menggunakan tipe data spasial JTS (Point, Geometry)
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# Alternatif: Database H2 In-Memory (Untuk Testing Cepat)
# ==============================================================
# Jika belum menginstal PostgreSQL, Anda bisa mematikan config di atas dan menghidupkan config H2 di bawah ini:
# Catatan: H2 mungkin membutuhkan ekstensi H2GIS khusus untuk membaca tipe data JTS Point/Geometry.
